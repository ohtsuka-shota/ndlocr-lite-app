# Phase 2: frontend + ndlocr 確認用
# frontend コンテナ（nginx）と ndlocr を起動してブラウザから OCR を確認する
#
# 起動: docker compose -f docker-compose.phase02.yml up --build -d
# API：curl -X POST http://localhost:8080/ocr -F "file=@test.pdf"
# フロント: http://localhost:5173

services:
  ndlocr:
    build: ./ndlocr
    ports:
      - "8080:8080"
    environment:
      - LOG_LEVEL=debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      ndlocr:
        condition: service_healthy
