# Phase 3: frontend + backend + ndlocr 確認用（3層構成）
#
# Phase 2（2層）から backend（AWS Bedrock 補正）を追加したフェーズ。
# nginx.phase03.conf を volume mount して経路を振り分ける:
#   POST /api/ocr      → ndlocr:8080  （OCR・LLMなし）
#   POST /api/correct  → backend:8000 （LLM補正・AWS Bedrock）
#   GET  /api/health   → backend:8000 （backend 死活確認）
#
# 起動: docker compose -f docker-compose.phase03.yml up --build -d
# フロント: http://localhost:5173
# ndlocr 直叩き: curl -X POST http://localhost:8080/ocr -F "file=@test.pdf"
# backend 直叩き: curl http://localhost:8000/health

services:
  ndlocr:
    build: ./ndlocr
    ports:
      - "8080:8080"
    environment:
      - LOG_LEVEL=debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-bedrock}
      - LLM_MODEL=${LLM_MODEL:-us.anthropic.claude-haiku-4-5-20251001-v1:0}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    volumes:
      - ./frontend/nginx.phase03.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      ndlocr:
        condition: service_healthy
      backend:
        condition: service_healthy
