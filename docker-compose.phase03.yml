# Phase 3: フルスタック開発用（= docker-compose.yml と同等）
# frontend + backend + ndlocr を全部起動
#
# 起動: docker compose -f docker-compose.phase3.yml up --build
# フロント: http://localhost:5173
# API:      http://localhost:8000/docs

services:
  ndlocr:
    build: ./ndlocr
    expose:
      - "8080"
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - NDLOCR_URL=http://ndlocr:8080
      - ANTHROPIC_KEY=${ANTHROPIC_KEY}
      - LLM_MODEL=${LLM_MODEL:-claude-haiku-4-5-20251001}
    depends_on:
      ndlocr:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend
